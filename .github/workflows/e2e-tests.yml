name: E2E Tests Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: e2e
        run: npx playwright test --reporter=json,html
        env:
          TEST_ADMIN_EMAIL: jagzao@gmail.com
          TEST_ADMIN_PASSWORD: admin
          TEST_TENANT_SLUG: wondernails
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

      - name: Verify E2E threshold (>=88%)
        if: success() || failure()
        run: |
          if [ -f playwright-report/results.json ]; then
            PASSED=$(cat playwright-report/results.json | jq '.stats.expected // .stats.tests // (.stats.passed + .stats.flaky + .stats.skipped)' 2>/dev/null || echo "0")
            TOTAL=$(cat playwright-report/results.json | jq '.stats.total' 2>/dev/null || echo "0")
            if [ "$PASSED" -gt 0 ] && [ "$TOTAL" -gt 0 ]; then
              PCT=$((PASSED * 100 / TOTAL))
              echo "E2E: $PASSED/$TOTAL ($PCT%)"
              if [ $PCT -lt 88 ]; then
                echo "::error::E2E threshold no alcanzado: $PCT% < 88%"
                exit 1
              fi
              echo "✅ E2E threshold OK: $PCT%"
            fi
          fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
