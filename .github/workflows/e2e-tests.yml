name: E2E Tests Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke + critical tests (subset)
        id: e2e
        run: npm run test:e2e:subset -- --grep "smoke|critical|auth|booking|checkout|pos|deep-audit"
        env:
          TEST_ADMIN_EMAIL: jagzao@gmail.com
          TEST_ADMIN_PASSWORD: admin
          TEST_TENANT_SLUG: wondernails
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

      - name: Run E2E full suite (non-blocking report)
        if: success() || failure()
        run: npm run test:e2e:subset -- --grep "." || true
        env:
          TEST_ADMIN_EMAIL: jagzao@gmail.com
          TEST_ADMIN_PASSWORD: admin
          TEST_TENANT_SLUG: wondernails
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
